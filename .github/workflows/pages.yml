name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - iclock.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Pages with PAT
        if: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}

      - name: Verify Pages configuration
        uses: actions/configure-pages@v6

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp iclock.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
