name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - iclock.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_TOKEN }}

    outputs:
      pages-enabled: ${{ steps.pages.outputs.enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Pages with PAT
        if: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}

      - name: Check Pages configuration
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/pages")

          if [[ "${status}" == "200" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::GitHub Pages is not enabled or not configured for GitHub Actions. Set Settings > Pages > Build and deployment > Source to GitHub Actions, or add a Pages-capable PAT as the PAGES_TOKEN repository secret."

      - name: Prepare site
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp iclock.html _site/index.html

      - name: Upload Pages artifact
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    if: ${{ needs.build.outputs.pages-enabled == 'true' }}
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
