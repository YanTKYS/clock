
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #clock {
            font-size: 35vw;
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
<script type="text/javascript" nonce="68e28ad2bf054077a9bd283abc8" src="//local.adguard.org?ts=1784434357195&amp;type=content-script&amp;dmn=contribution.usercontent.google.com&amp;url=https%3A%2F%2Fcontribution.usercontent.google.com%2Fdownload%3Fc%3DCgxiYXJkX3N0b3JhZ2USUBINcmVzcG9uc2VfZGF0YRo_CjBlOWViNmE5YmZlOGQ1NmM1MDAwNjU2OWYxNWUxYmY1NzA3ZjU0NTMzMTkyN2U0ZjUSCxIHEI_g_cKWAxgB%26filename%3Dclock_v2.html%26opi%3D103135050&amp;app=chrome.exe&amp;css=3&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="68e28ad2bf054077a9bd283abc8" src="//local.adguard.org?ts=1784434357195&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
    <div id="clock">00:00</div>
    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
