<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClock - ローカル時計・シーケンスタイマー</title>
  <style>
    :root{--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#475569;--line:#cbd5e1;--accent:#2563eb;--accentText:#fff;--warn:#b45309;--danger:#b91c1c;--shadow:0 12px 30px rgba(15,23,42,.14)}
    [data-theme="dark"]{--bg:#090e18;--panel:#121a2a;--text:#e5eefb;--muted:#a7b5ca;--line:#334155;--accent:#60a5fa;--accentText:#07111f;--warn:#fbbf24;--danger:#f87171;--shadow:0 12px 30px rgba(0,0,0,.45)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;font-variant-numeric:tabular-nums} button,input,select,textarea{font:inherit} button{border:1px solid var(--line);border-radius:12px;padding:.65rem .9rem;background:var(--panel);color:var(--text);cursor:pointer;min-height:44px} button:hover{border-color:var(--accent)} button.primary,.tab[aria-selected="true"]{background:var(--accent);color:var(--accentText);border-color:var(--accent);font-weight:700} button.danger{color:var(--danger);border-color:var(--danger)} button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--accent);outline-offset:2px} input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--text);padding:.55rem} label{display:grid;gap:.25rem;color:var(--muted);font-size:.92rem}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}.top{display:flex;gap:.5rem;align-items:center;justify-content:space-between;padding:.7rem 1rem}.tabs,.actions,.controls{display:flex;gap:.5rem;flex-wrap:wrap}.stage{display:grid;place-items:center;padding:.25rem 1rem 1rem}.mode{width:min(1200px,100%);display:none}.mode.active{display:block}.hero{text-align:center}.main-time{font-size:clamp(4rem,20vw,16rem);line-height:.95;font-weight:750;letter-spacing:-.06em;user-select:none}.sub{font-size:clamp(1rem,3vw,2rem);color:var(--muted);margin-top:.5rem}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.25rem .65rem;margin:.25rem;color:var(--muted);background:var(--panel)}.timer-name{font-size:clamp(1.4rem,5vw,4rem);font-weight:700}.controls{justify-content:center;margin-top:1rem}.panel{position:fixed;inset:0;display:none;background:rgba(0,0,0,.35);padding:1rem;z-index:10}.panel.open{display:grid;place-items:center}.dialog{width:min(1000px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:1rem}.dialog header{display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--panel);padding-bottom:.5rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem}.section{border-top:1px solid var(--line);margin-top:1rem;padding-top:1rem}.row{display:grid;grid-template-columns:2.2rem 1.2fr .7fr auto auto;gap:.5rem;align-items:end;margin:.5rem 0}.announce-row{display:grid;grid-template-columns:2.2rem .55fr .55fr 1.5fr;gap:.5rem;align-items:end;margin:.5rem 0}.timer-announce-row{display:grid;grid-template-columns:2.2rem .8fr 1.8fr;gap:.5rem;align-items:end;margin:.5rem 0}.toast{position:fixed;left:50%;bottom:1rem;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.6rem 1rem;border-radius:999px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}.status{font-weight:700}.hint{color:var(--muted);font-size:.9rem}.invalid{border-color:var(--danger)!important}.warn{color:var(--warn)}@media(max-width:720px){.row,.announce-row,.timer-announce-row{grid-template-columns:1fr}.main-time{font-size:22vw}}
  </style>
</head>
<body>
<div class="app">
  <nav class="top" aria-label="モード切替"><div class="tabs"><button id="clockTab" class="tab" aria-selected="true">時計</button><button id="timerTab" class="tab" aria-selected="false">タイマー</button></div><div class="actions"><button id="themeBtn">テーマ切替</button><button id="voiceBtn">音声を有効化</button><button id="settingsBtn" class="primary">設定</button></div></nav>
  <main class="stage"><section id="clockMode" class="mode active"><div class="hero"><div id="clockTime" class="main-time">00:00:00</div><div id="clockDate" class="sub"></div><div id="offsetBadge" class="badge">端末時刻</div></div></section><section id="timerMode" class="mode"><div class="hero"><div id="timerTime" class="main-time">00:08</div><div id="timerName" class="timer-name">第1区間</div><div class="sub"><span id="timerPos" class="badge">1 / 3</span><span id="timerNext" class="badge">次: 第2区間</span><span id="timerStatus" class="badge status">停止中</span></div><div class="controls"><button id="prevBtn">前へ</button><button id="startPauseBtn" class="primary">開始</button><button id="nextBtn">次へ</button><button id="resetBtn">リセット</button></div><p class="hint">ショートカット: Space=開始/一時停止/再開、R=リセット、Escape=設定を閉じる</p></div></section></main>
</div>
<div id="settingsPanel" class="panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle"><div class="dialog"><header><h1 id="settingsTitle">設定</h1><button id="closeSettings">閉じる</button></header>
  <div class="section"><h2>時計</h2><div class="grid"><label>表示オフセット（分）<input id="offsetInput" type="number" step="1"></label><div><button id="resetOffsetBtn">現在時刻に戻す</button><p class="hint">時計読み上げ判定は端末の実時刻ではなく、オフセット後の表示時刻を基準にします。</p></div></div></div>
  <div class="section"><h2>時計読み上げ（最大5件）</h2><div id="clockAnnounces"></div><button id="resetClockFired">時計読み上げ状態をリセット</button></div>
  <div class="section"><h2>タイマーシーケンス</h2><div id="seqRows"></div><button id="addSeq">シーケンス追加</button></div>
  <div class="section"><h2>タイマー読み上げ（全シーケンス共通・最大5件）</h2><div id="timerAnnounces"></div></div>
  <div class="section"><h2>音声・保存</h2><div class="grid"><label>読み上げ速度<input id="rateInput" type="number" min="0.5" max="1.5" step="0.1"></label><label>読み上げテスト文<input id="testText" value="読み上げテストです"></label></div><p id="voiceStatus" class="hint"></p><div class="controls"><button id="testVoice">読み上げテスト</button><button id="saveSettings" class="primary">設定を保存</button><button id="resetAll" class="danger">設定を初期化</button></div><p class="hint">設定はこのブラウザのlocalStorageに保存され、外部送信されません。</p></div>
</div></div><div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
'use strict';
(() => {
const KEY='iclock.settings.v1';
const defaults={version:1,mode:'clock',theme:'auto',offsetMinutes:0,voice:{rate:1},clockAnnouncements:[{enabled:false,hour:13,minute:55,second:0,text:'残り5分です'}],timerAnnouncements:[{enabled:true,seconds:5,text:'残り5秒です'},{enabled:true,seconds:0,text:'終了してください'}],sequences:[{name:'第1区間',seconds:8},{name:'第2区間',seconds:6},{name:'第3区間',seconds:4}]};
const $=id=>document.getElementById(id); const clone=o=>JSON.parse(JSON.stringify(o));
let state=load(); let lastClockDateKey='', lastDisplayTime=null, toastTimer=0;
let timer={index:0,running:false,done:false,startMono:0,pausedElapsed:0,lastRemaining:null,fired:new Set(),zeroHandled:false};
function load(){try{const raw=localStorage.getItem(KEY); if(!raw)return clone(defaults); const v=JSON.parse(raw); if(v.version!==1)throw Error('version'); return {...clone(defaults),...v,voice:{...defaults.voice,...(v.voice||{})}}}catch(e){return clone(defaults)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2400)}
function pad(n){return String(n).padStart(2,'0')} function fmtClock(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`} function fmtTimer(sec){sec=Math.max(0,Math.ceil(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h?`${pad(h)}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`}
function displayNow(){return new Date(Date.now()+state.offsetMinutes*60000)} function dateKey(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`} function secOfDay(d){return d.getHours()*3600+d.getMinutes()*60+d.getSeconds()+d.getMilliseconds()/1000}
function applyTheme(){let th=state.theme==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):state.theme;document.documentElement.dataset.theme=th;$('themeBtn').textContent=th==='dark'?'ライトへ':'ダークへ'}
function setMode(m){state.mode=m;save();$('clockMode').classList.toggle('active',m==='clock');$('timerMode').classList.toggle('active',m==='timer');$('clockTab').ariaSelected=m==='clock';$('timerTab').ariaSelected=m==='timer'}
function speak(text){ if(!text.trim())return; if(!('speechSynthesis'in window)){toast('このブラウザは音声読み上げに未対応です');return;} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text.slice(0,160)); u.lang='ja-JP'; u.rate=Number(state.voice.rate)||1; speechSynthesis.speak(u); toast(`読み上げ: ${text}`); }
function updateClock(){const now=displayNow();$('clockTime').textContent=fmtClock(now);$('clockDate').textContent=now.toLocaleDateString('ja-JP',{weekday:'long',year:'numeric',month:'long',day:'numeric'});$('offsetBadge').textContent=state.offsetMinutes?`補正中 ${state.offsetMinutes>0?'+':''}${state.offsetMinutes}分`:'端末時刻'; checkClockAnnouncements(now); lastDisplayTime=now;}
function checkClockAnnouncements(now){const dk=dateKey(now); if(dk!==lastClockDateKey){state.clockAnnouncements.forEach(a=>a.firedKey='');lastClockDateKey=dk;save()} if(!lastDisplayTime){return} const prev=secOfDay(lastDisplayTime), cur=secOfDay(now); state.clockAnnouncements.forEach((a,i)=>{if(!a.enabled||!a.text)return; const target=(+a.hour)*3600+(+a.minute)*60+(+a.second||0); const key=`${dk}-${i}-${target}`; const crossed=cur>=prev?prev<target&&target<=cur:(target>prev||target<=cur); if(crossed&&a.firedKey!==key){a.firedKey=key;save();speak(a.text)}})}
function validSeqs(){return state.sequences.filter(s=>s.name.trim()&&Number(s.seconds)>0)} function currentSeq(){return validSeqs()[timer.index]||null}
function remaining(){const s=currentSeq(); if(!s)return 0; return timer.running?Math.max(0,Number(s.seconds)-((performance.now()-timer.startMono)/1000+timer.pausedElapsed)):Math.max(0,Number(s.seconds)-timer.pausedElapsed)}
function rebuildTimer(idx=0){timer.index=Math.max(0,Math.min(idx,validSeqs().length-1));timer.running=false;timer.done=false;timer.pausedElapsed=0;timer.lastRemaining=null;timer.fired=new Set();timer.zeroHandled=false;if (window.speechSynthesis) speechSynthesis.cancel();renderTimer()}
function startTimer(){if(!currentSeq())return toast('有効なシーケンスがありません'); if(timer.done)rebuildTimer(0); if(!timer.running){timer.startMono=performance.now();timer.running=true;timer.lastRemaining=remaining();toast('タイマー開始');}}
function pauseTimer(){if(timer.running){timer.pausedElapsed+= (performance.now()-timer.startMono)/1000; timer.running=false; toast('一時停止')}}
function nextSeq(){if(timer.index<validSeqs().length-1)rebuildTimer(timer.index+1); else {timer.done=true;timer.running=false;timer.pausedElapsed=Number(currentSeq()?.seconds||0);renderTimer();toast('全シーケンス終了')}}
function prevSeq(){rebuildTimer(timer.index-1)}
function checkTimerAnnounces(rem){if(!timer.running||!currentSeq())return; const prev=timer.lastRemaining??rem; state.timerAnnouncements.forEach((a,i)=>{const threshold=Number(a.seconds); if(!a.enabled||!a.text||threshold<0)return; if(!timer.fired.has(i)&&prev>threshold&&rem<=threshold){timer.fired.add(i);speak(a.text)}}); timer.lastRemaining=rem; if(rem<=0&&!timer.zeroHandled){timer.zeroHandled=true; state.timerAnnouncements.forEach((a,i)=>{if(a.enabled&&Number(a.seconds)===0&&!timer.fired.has(i)){timer.fired.add(i);speak(a.text)}}); setTimeout(()=>nextSeq(),250); }}
function renderTimer(){const seqs=validSeqs(), s=currentSeq(); const rem=remaining(); checkTimerAnnounces(rem); $('timerTime').textContent=fmtTimer(rem); $('timerName').textContent=s?s.name:(timer.done?'全体終了':'シーケンスなし'); $('timerPos').textContent=s?`${timer.index+1} / ${seqs.length}`:'0 / 0'; $('timerNext').textContent=seqs[timer.index+1]?`次: ${seqs[timer.index+1].name}`:'次: なし'; $('timerStatus').textContent=timer.done?'終了':timer.running?'動作中':'停止中'; $('startPauseBtn').textContent=timer.running?'一時停止':(timer.pausedElapsed>0?'再開':'開始');}
function renderSettings(){ $('offsetInput').value=state.offsetMinutes; $('rateInput').value=state.voice.rate; const ca=$('clockAnnounces'); ca.innerHTML=''; for(let i=0;i<5;i++){const a=state.clockAnnouncements[i]||{enabled:false,hour:0,minute:0,second:0,text:''}; ca.insertAdjacentHTML('beforeend',`<div class="announce-row"><label>有効<input data-ca="${i}" data-k="enabled" type="checkbox" ${a.enabled?'checked':''}></label><label>時<input data-ca="${i}" data-k="hour" type="number" min="0" max="23" value="${a.hour}"></label><label>分/秒<input data-ca="${i}" data-k="minute" type="number" min="0" max="59" value="${a.minute}"><input data-ca="${i}" data-k="second" type="number" min="0" max="59" value="${a.second||0}"></label><label>文章<input data-ca="${i}" data-k="text" value="${esc(a.text)}"></label></div>`)} const ta=$('timerAnnounces');ta.innerHTML='';for(let i=0;i<5;i++){const a=state.timerAnnouncements[i]||{enabled:false,seconds:0,text:''};ta.insertAdjacentHTML('beforeend',`<div class="timer-announce-row"><label>有効<input data-ta="${i}" data-k="enabled" type="checkbox" ${a.enabled?'checked':''}></label><label>残り秒<input data-ta="${i}" data-k="seconds" type="number" min="0" value="${a.seconds}"></label><label>文章<input data-ta="${i}" data-k="text" value="${esc(a.text)}"></label></div>`)} renderSeqRows();}
function renderSeqRows(){const box=$('seqRows');box.innerHTML='';state.sequences.forEach((s,i)=>box.insertAdjacentHTML('beforeend',`<div class="row"><span>${i+1}</span><label>名前<input data-seq="${i}" data-k="name" value="${esc(s.name)}"></label><label>秒<input data-seq="${i}" data-k="seconds" type="number" min="1" value="${s.seconds}"></label><button data-up="${i}">上へ</button><button data-del="${i}" class="danger">削除</button></div>`))} function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function collect(){state.offsetMinutes=parseInt($('offsetInput').value||'0',10);state.voice.rate=Number($('rateInput').value)||1;state.clockAnnouncements=[];document.querySelectorAll('[data-ca]').forEach(el=>{let i=+el.dataset.ca,k=el.dataset.k;state.clockAnnouncements[i]??={};state.clockAnnouncements[i][k]=el.type==='checkbox'?el.checked:(k==='text'?el.value:Number(el.value))});state.timerAnnouncements=[];document.querySelectorAll('[data-ta]').forEach(el=>{let i=+el.dataset.ta,k=el.dataset.k;state.timerAnnouncements[i]??={};state.timerAnnouncements[i][k]=el.type==='checkbox'?el.checked:(k==='text'?el.value:Number(el.value))});document.querySelectorAll('[data-seq]').forEach(el=>{let i=+el.dataset.seq,k=el.dataset.k;state.sequences[i][k]=k==='seconds'?Number(el.value):el.value});state.clockAnnouncements.forEach(a=>a.firedKey='');}
function validate(){let ok=true;document.querySelectorAll('.invalid').forEach(e=>e.classList.remove('invalid'));state.sequences.forEach((s,i)=>{if(!s.name.trim()||!(Number(s.seconds)>0)){document.querySelectorAll(`[data-seq="${i}"]`).forEach(e=>e.classList.add('invalid'));ok=false}}); if(!validSeqs().length)ok=false; return ok;}
function openSettings(){renderSettings();$('settingsPanel').classList.add('open');$('closeSettings').focus()} function closeSettings(){ $('settingsPanel').classList.remove('open');$('settingsBtn').focus()}
function bind(){ $('clockTab').onclick=()=>setMode('clock');$('timerTab').onclick=()=>setMode('timer');$('themeBtn').onclick=()=>{state.theme=document.documentElement.dataset.theme==='dark'?'light':'dark';save();applyTheme()};$('settingsBtn').onclick=openSettings;$('closeSettings').onclick=closeSettings;$('voiceBtn').onclick=()=>speak('音声を有効化しました');$('startPauseBtn').onclick=()=>timer.running?pauseTimer():startTimer();$('resetBtn').onclick=()=>rebuildTimer(0);$('nextBtn').onclick=nextSeq;$('prevBtn').onclick=prevSeq;$('resetOffsetBtn').onclick=()=>{$('offsetInput').value=0};$('resetClockFired').onclick=()=>{state.clockAnnouncements.forEach(a=>a.firedKey='');save();toast('時計読み上げ状態をリセットしました')};$('testVoice').onclick=()=>speak($('testText').value);$('addSeq').onclick=()=>{state.sequences.push({name:'新規区間',seconds:60});renderSeqRows()};$('seqRows').onclick=e=>{if(e.target.dataset.del){state.sequences.splice(+e.target.dataset.del,1);renderSeqRows()} if(e.target.dataset.up&&+e.target.dataset.up>0){let i=+e.target.dataset.up;[state.sequences[i-1],state.sequences[i]]=[state.sequences[i],state.sequences[i-1]];renderSeqRows()}};$('saveSettings').onclick=()=>{collect(); if(!validate())return toast('シーケンス名と秒数を確認してください'); save(); applyTheme(); rebuildTimer(Math.min(timer.index,validSeqs().length-1)); toast('設定を保存しました'); closeSettings()};$('resetAll').onclick=()=>{if(confirm('設定を初期化しますか？')){state=clone(defaults);save();rebuildTimer(0);applyTheme();renderSettings();toast('初期化しました')}};document.addEventListener('keydown',e=>{const tag=e.target.tagName;if(e.key==='Escape')closeSettings(); if(['INPUT','TEXTAREA','SELECT'].includes(tag))return; if(e.code==='Space'&&state.mode==='timer'){e.preventDefault();timer.running?pauseTimer():startTimer()} if(e.key.toLowerCase()==='r'&&state.mode==='timer')rebuildTimer(0)});}
function init(){applyTheme();setMode(state.mode);bind();rebuildTimer(0);updateClock();setInterval(updateClock,250);setInterval(renderTimer,120);$('voiceStatus').textContent=('speechSynthesis'in window)?'ブラウザ標準のSpeech Synthesis APIを使用します。':'音声読み上げ非対応のブラウザです。'} init();
})();
</script>
</body>
</html>
