<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClock - ローカル時計・タイマー</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --accent: #2563eb;
      --accentText: #ffffff;
      --warn: #b45309;
      --danger: #b91c1c;
      --shadow: 0 12px 30px rgba(15, 23, 42, .14);
    }

    [data-theme="dark"] {
      --bg: #090e18;
      --panel: #121a2a;
      --text: #e5eefb;
      --muted: #a7b5ca;
      --line: #334155;
      --accent: #60a5fa;
      --accentText: #07111f;
      --warn: #fbbf24;
      --danger: #f87171;
      --shadow: 0 12px 30px rgba(0, 0, 0, .45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      font-variant-numeric: tabular-nums;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 44px;
      padding: .65rem .9rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary,
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accentText);
      font-weight: 700;
    }

    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    input,
    textarea {
      width: 100%;
      padding: .55rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
    }

    label {
      display: grid;
      gap: .25rem;
      color: var(--muted);
      font-size: .92rem;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .5rem;
    }

    .tabs,
    .actions,
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
    }

    .stage {
      min-height: calc(100vh - 58px);
      display: grid;
      place-items: center;
      padding: .15rem;
    }

    .mode {
      width: min(100%, 1900px);
      display: none;
    }

    .mode.active {
      display: block;
    }

    .hero {
      text-align: center;
    }

    .main-time {
      font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums lining-nums;
      line-height: .84;
      font-weight: 850;
      letter-spacing: -.075em;
      user-select: none;
    }

    .clock-face {
      display: inline-block;
    }

    .clock-seconds {
      position: fixed;
      right: clamp(.75rem, 2vw, 2rem);
      bottom: clamp(.55rem, 1.4vw, 1.4rem);
      min-width: 2ch;
      color: var(--muted);
      font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(2rem, 7vw, 6.5rem);
      font-weight: 800;
      letter-spacing: 0;
      opacity: .72;
    }

    .bottom-meta {
      position: fixed;
      left: 50%;
      bottom: clamp(.55rem, 1.4vw, 1.4rem);
      display: grid;
      justify-items: center;
      gap: .45rem;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #clockMode .main-time,
    #timerMode .main-time {
      font-size: min(40vw, 62vh);
    }

    .sub {
      margin-top: .35rem;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 2rem);
    }

    .badge {
      display: inline-block;
      margin: .2rem;
      padding: .25rem .65rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
    }

    .controls {
      justify-content: center;
      margin-top: .55rem;
    }

    .panel {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 1rem;
      background: rgba(0, 0, 0, .35);
    }

    .panel.open {
      display: grid;
    }

    .dialog {
      width: min(860px, 100%);
      max-height: 92vh;
      overflow: auto;
      padding: .75rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .dialog h1,
    .dialog h2 {
      margin: .25rem 0 .5rem;
    }

    .dialog header {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: .5rem;
      background: var(--panel);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, max-content));
      gap: .55rem;
    }

    .section {
      margin-top: .65rem;
      padding-top: .65rem;
      border-top: 1px solid var(--line);
    }

    .row,
    .announce-row,
    .timer-announce-row {
      display: grid;
      align-items: end;
      gap: .5rem;
      margin: .5rem 0;
    }

    .row {
      grid-template-columns: 2.2rem 1.2fr .7fr auto auto;
    }

    .announce-row {
      grid-template-columns: 3.2rem 5.5rem 5.5rem 5.5rem minmax(14rem, 1fr);
    }

    .timer-announce-row {
      grid-template-columns: 3.2rem 7rem minmax(14rem, 1fr);
    }

    .agenda-row {
      display: grid;
      grid-template-columns: 3.2rem 5.5rem 5.5rem minmax(9rem, 1fr) 4.5rem minmax(12rem, 1fr) auto auto auto;
      align-items: end;
      gap: .5rem;
      margin: .5rem 0;
    }

    .agenda-stack {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 0;
      width: 100%;
      min-height: 100%;
      padding: 0 1rem;
    }

    .agenda-delta {
      display: grid;
      justify-items: center;
      gap: 0;
      line-height: .85;
    }

    .agenda-delta-label {
      color: var(--muted);
      font-size: min(7vw, 8vh);
      font-weight: 800;
      letter-spacing: 0;
    }

    .agenda-delta-value {
      font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums lining-nums;
      max-width: 96vw;
      margin-top: -.08em;
      font-size: min(30vw, 52vh);
      font-weight: 850;
      letter-spacing: -.06em;
      line-height: .82;
      white-space: nowrap;
    }

    .agenda-delta-value[data-long="true"] {
      font-size: min(19vw, 42vh);
    }

    .agenda-message {
      max-width: min(92vw, 1200px);
      color: var(--text);
      font-size: min(12vw, 13vh);
      font-weight: 850;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .agenda-title {
      max-width: min(92vw, 1200px);
      color: var(--text);
      font-size: min(10vw, 12vh);
      margin-top: clamp(.15rem, .8vh, .6rem);
      font-weight: 800;
      line-height: 1.08;
      display: -webkit-box;
      overflow: hidden;
      overflow-wrap: break-word;
      word-break: keep-all;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    #agendaTime {
      margin-top: clamp(.2rem, .7vh, .5rem);
      font-size: min(7vw, 8vh);
      font-weight: 700;
    }

    .settings-panel[data-mode="clock"] .setting-timer,
    .settings-panel[data-mode="clock"] .setting-agenda,
    .settings-panel[data-mode="timer"] .setting-clock,
    .settings-panel[data-mode="timer"] .setting-agenda,
    .settings-panel[data-mode="agenda"] .setting-clock,
    .settings-panel[data-mode="agenda"] .setting-timer {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 1rem;
      z-index: 20;
      padding: .6rem 1rem;
      border-radius: 999px;
      background: var(--text);
      color: var(--bg);
      opacity: 0;
      transform: translateX(-50%);
      transition: .2s;
    }

    .toast.show {
      opacity: 1;
    }

    .status {
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: .9rem;
    }

    .invalid {
      border-color: var(--danger) !important;
    }

    @media (max-width: 720px) {
      .top {
        align-items: flex-start;
      }

      .row,
      .announce-row,
      .timer-announce-row,
      .agenda-row {
        grid-template-columns: 1fr;
      }

      #clockMode .main-time,
      #timerMode .main-time {
        font-size: 40vw;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="top" aria-label="モード切替">
      <div class="tabs">
        <button id="clockTab" class="tab" aria-selected="true">時計</button>
        <button id="timerTab" class="tab" aria-selected="false">タイマー</button>
        <button id="agendaTab" class="tab" aria-selected="false">予定時刻</button>
      </div>
      <div class="actions">
        <button id="themeBtn">テーマ切替</button>
        <button id="voiceBtn">音声を有効化</button>
        <button id="settingsBtn" class="primary">設定</button>
      </div>
    </nav>

    <main class="stage">
      <section id="clockMode" class="mode active">
        <div class="hero">
          <div class="clock-face">
            <div id="clockTime" class="main-time">00:00</div>
          </div>
          <div id="clockSeconds" class="clock-seconds">00</div>
          <div class="clock-meta bottom-meta">
            <span id="clockDate" class="sub"></span>
          </div>
        </div>
      </section>

      <section id="timerMode" class="mode">
        <div class="hero">
          <div id="timerTime" class="main-time">10:00</div>
          <div class="timer-meta bottom-meta">
            <div>
              <span id="timerStatus" class="badge status">停止中</span>
            </div>
            <div class="controls">
              <button id="startPauseBtn" class="primary">開始</button>
              <button id="resetBtn">リセット</button>
            </div>
            <p class="hint">ショートカット: Space=開始/一時停止/再開、R=リセット、Escape=設定を閉じる</p>
          </div>
        </div>
      </section>

      <section id="agendaMode" class="mode">
        <div class="hero agenda-stack">
          <div id="agendaMessage" class="agenda-message">予定なし</div>
          <div id="agendaDelta" class="agenda-delta" hidden>
            <span id="agendaDeltaLabel" class="agenda-delta-label">あと</span>
            <span id="agendaDeltaValue" class="agenda-delta-value">00:00</span>
          </div>
          <div id="agendaTime" class="sub"></div>
          <div id="agendaTitle" class="agenda-title">設定から予定を追加してください</div>
        </div>
      </section>
    </main>
  </div>

  <div id="settingsPanel" class="panel settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="dialog">
      <header>
        <h1 id="settingsTitle">設定</h1>
        <button id="closeSettings">閉じる</button>
      </header>

      <div class="section setting-clock">
        <h2>時計読み上げ（最大5件）</h2>
        <div id="clockAnnounces"></div>
        <button id="resetClockFired">時計読み上げ状態をリセット</button>
      </div>

      <div class="section setting-timer">
        <h2>タイマー</h2>
        <div class="grid">
          <label>
            残り時間（分）
            <input id="timerDurationInput" type="number" min="1" step="1">
          </label>
          <label>
            開始時刻
            <input id="timerStartTimeInput" type="time">
          </label>
        </div>
        <p class="hint">開始時刻を設定すると、時計の表示時刻がその時刻を通過したときにタイマーを自動開始します。</p>
      </div>

      <div class="section setting-timer">
        <h2>タイマー読み上げ（最大5件）</h2>
        <div id="timerAnnounces"></div>
      </div>

      <div class="section setting-agenda">
        <h2>予定時刻</h2>
        <div class="grid">
          <label>
            超過表示時間（分）
            <input id="agendaOverrunInput" type="number" min="1" max="60" step="1">
          </label>
        </div>
        <p class="hint">予定時刻を過ぎた直後は、この時間だけ直前の予定を超過表示します。判定には端末時刻を使います。</p>
        <div id="agendaItems"></div>
        <button id="addAgendaItem">予定を追加</button>
      </div>

      <div class="section">
        <h2>音声・保存</h2>
        <div class="grid">
          <label>
            読み上げ速度
            <input id="rateInput" type="number" min="0.5" max="1.5" step="0.1">
          </label>
          <label>
            読み上げテスト文
            <input id="testText" value="読み上げテストです">
          </label>
        </div>
        <p id="voiceStatus" class="hint"></p>
        <div class="controls">
          <button id="testVoice">読み上げテスト</button>
          <button id="saveSettings" class="primary">設定を保存</button>
          <button id="resetAll" class="danger">設定を初期化</button>
        </div>
        <p class="hint">設定はこのブラウザのlocalStorageに保存され、外部送信されません。</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    'use strict';

    (() => {
      const STORAGE_KEY = 'iclock.settings.v1';
      const MAX_ANNOUNCEMENTS = 5;
      const MAX_AGENDA_ITEMS = 10;
      const TIMER_FINISH_DELAY_MS = 250;
      const defaults = {
        version: 1,
        mode: 'clock',
        theme: 'auto',
        timerDurationMinutes: 10,
        timerStartTime: '',
        lastTimerStartKey: '',
        clockFiredDateKey: '',
        agendaOverrunMinutes: 10,
        agendaFiredDateKey: '',
        agendaItems: [],
        voice: { rate: 1 },
        clockAnnouncements: [
          { enabled: false, hour: 13, minute: 55, second: 0, text: '残り5分です' },
        ],
        timerAnnouncements: [
          { enabled: true, minutes: 5, text: '残り5分です' },
          { enabled: true, minutes: 0, text: '終了してください' },
        ],
      };

      const $ = (id) => document.getElementById(id);
      const clone = (object) => JSON.parse(JSON.stringify(object));
      const setText = (id, value) => {
        const element = $(id);
        if (element) element.textContent = value;
      };

      let state = loadSettings();
      let lastDisplayTime = null;
      let toastTimer = 0;
      let timer = {
        running: false,
        done: false,
        startMono: 0,
        pausedElapsed: 0,
        lastRemaining: null,
        fired: new Set(),
        zeroHandled: false,
        finishTimeoutId: null,
        generation: 0,
      };

      let speechQueue = [];
      let speechActive = false;
      let speechActiveId = '';
      let speechGeneration = 0;
      let speechIds = new Set();

      function loadSettings() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return clone(defaults);

          const saved = JSON.parse(raw);
          if (saved.version !== 1) throw new Error('Unsupported settings version');

          return normalizeSettings({
            ...clone(defaults),
            ...saved,
            voice: { ...defaults.voice, ...(saved.voice || {}) },
          });
        } catch (error) {
          return clone(defaults);
        }
      }

      function normalizeSettings(settings) {
        delete settings.offsetMinutes;
        if (!['clock', 'timer', 'agenda'].includes(settings.mode)) settings.mode = defaults.mode;
        settings.clockFiredDateKey = typeof settings.clockFiredDateKey === 'string' ? settings.clockFiredDateKey : '';
        settings.agendaFiredDateKey = typeof settings.agendaFiredDateKey === 'string' ? settings.agendaFiredDateKey : '';
        settings.timerDurationMinutes = Math.max(1, parseInt(settings.timerDurationMinutes || defaults.timerDurationMinutes, 10));
        settings.timerStartTime = typeof settings.timerStartTime === 'string' ? settings.timerStartTime : '';
        settings.agendaOverrunMinutes = clampInteger(settings.agendaOverrunMinutes, 1, 60, defaults.agendaOverrunMinutes);
        delete settings.sequences;

        settings.clockAnnouncements = normalizeClockAnnouncements(settings.clockAnnouncements);
        settings.timerAnnouncements = normalizeTimerAnnouncements(settings.timerAnnouncements);
        settings.agendaItems = normalizeAgendaItems(settings.agendaItems);

        return settings;
      }

      function normalizeClockAnnouncements(announcements) {
        const normalized = (announcements || []).slice(0, MAX_ANNOUNCEMENTS).map((announcement) => ({
          enabled: Boolean(announcement.enabled),
          hour: clampInteger(announcement.hour, 0, 23, 0),
          minute: clampInteger(announcement.minute, 0, 59, 0),
          second: clampInteger(announcement.second, 0, 59, 0),
          text: announcement.text || '',
          firedKey: typeof announcement.firedKey === 'string' ? announcement.firedKey : '',
        }));

        return normalized.length ? normalized : clone(defaults.clockAnnouncements);
      }

      function normalizeTimerAnnouncements(announcements) {
        const normalized = (announcements || []).slice(0, MAX_ANNOUNCEMENTS).map((announcement) => {
          const minutes = announcement.minutes ?? (announcement.seconds ? Math.ceil(Number(announcement.seconds) / 60) : 0);
          return {
            enabled: Boolean(announcement.enabled),
            minutes: clampInteger(minutes, 0, 1440, 0),
            text: announcement.text || '',
          };
        });

        return normalized.length ? normalized : clone(defaults.timerAnnouncements);
      }

      function normalizeAgendaItems(items) {
        if (!Array.isArray(items)) return clone(defaults.agendaItems);

        const normalized = items.slice(0, MAX_AGENDA_ITEMS).map((item) => {
          const safeItem = item || {};
          return {
            enabled: Boolean(safeItem.enabled),
            hour: clampInteger(safeItem.hour, 0, 23, 0),
            minute: clampInteger(safeItem.minute, 0, 59, 0),
            title: safeItem.title || '',
            announceEnabled: Boolean(safeItem.announceEnabled),
            announceText: safeItem.announceText || '',
            firedKey: typeof safeItem.firedKey === 'string' ? safeItem.firedKey : '',
          };
        });

        return normalized;
      }

      function clampInteger(value, min, max, fallback) {
        const number = Number(value);
        if (!Number.isFinite(number)) return fallback;
        return Math.min(max, Math.max(min, Math.trunc(number)));
      }

      function saveSettingsToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function showToast(message) {
        $('toast').textContent = message;
        $('toast').classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2400);
      }

      function pad(number) {
        return String(number).padStart(2, '0');
      }

      function formatClock(date) {
        return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function formatSeconds(date) {
        return pad(date.getSeconds());
      }

      function formatTimer(seconds) {
        const safeSeconds = Math.max(0, Math.ceil(seconds));
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        const restSeconds = safeSeconds % 60;

        if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(restSeconds)}`;
        return `${pad(minutes)}:${pad(restSeconds)}`;
      }

      function getDisplayNow() {
        return new Date();
      }

      function dateKey(date) {
        return `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
      }

      function secondsOfDay(date) {
        return date.getHours() * 3600 + date.getMinutes() * 60 + date.getSeconds() + date.getMilliseconds() / 1000;
      }

      function crossedTargetSeconds(previousSeconds, currentSeconds, targetSeconds) {
        return currentSeconds >= previousSeconds
          ? previousSeconds < targetSeconds && targetSeconds <= currentSeconds
          : targetSeconds > previousSeconds || targetSeconds <= currentSeconds;
      }

      function applyTheme() {
        const theme = state.theme === 'auto'
          ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : state.theme;

        document.documentElement.dataset.theme = theme;
        $('themeBtn').textContent = theme === 'dark' ? 'ライトへ' : 'ダークへ';
      }

      function setMode(mode) {
        state.mode = mode;
        saveSettingsToStorage();
        $('clockMode').classList.toggle('active', mode === 'clock');
        $('timerMode').classList.toggle('active', mode === 'timer');
        $('agendaMode').classList.toggle('active', mode === 'agenda');
        $('clockTab').ariaSelected = mode === 'clock';
        $('timerTab').ariaSelected = mode === 'timer';
        $('agendaTab').ariaSelected = mode === 'agenda';
      }

      function speak(text, eventId = '') {
        const message = text.trim();
        if (!message) return;

        if (!('speechSynthesis' in window)) {
          showToast('このブラウザは音声読み上げに未対応です');
          return;
        }

        const id = eventId || `manual-${Date.now()}-${Math.random()}`;
        if (speechIds.has(id)) return;

        while (speechQueue.length + (speechActive ? 1 : 0) >= MAX_ANNOUNCEMENTS && speechQueue.length > 0) {
          const dropped = speechQueue.shift();
          if (dropped) speechIds.delete(dropped.id);
        }

        if (speechQueue.length + (speechActive ? 1 : 0) >= MAX_ANNOUNCEMENTS) return;

        speechQueue.push({ id, message });
        speechIds.add(id);
        processSpeechQueue();
      }

      function processSpeechQueue() {
        if (speechActive || !speechQueue.length || !('speechSynthesis' in window)) return;

        const item = speechQueue.shift();
        const generation = speechGeneration;
        speechActive = true;
        speechActiveId = item.id;

        const finish = () => {
          if (generation !== speechGeneration) return;
          if (speechActiveId !== item.id) return;

          speechIds.delete(item.id);
          speechActive = false;
          speechActiveId = '';
          processSpeechQueue();
        };

        const utterance = new SpeechSynthesisUtterance(item.message.slice(0, 160));
        utterance.lang = 'ja-JP';
        utterance.rate = Number(state.voice.rate) || 1;
        utterance.onend = finish;
        utterance.onerror = finish;
        speechSynthesis.speak(utterance);
        showToast(`読み上げ: ${item.message}`);
      }

      function cancelSpeechQueue() {
        speechGeneration += 1;
        speechQueue = [];
        speechIds.clear();
        speechActive = false;
        speechActiveId = '';
        if (window.speechSynthesis) speechSynthesis.cancel();
      }

      function updateClock() {
        const now = getDisplayNow();
        $('clockTime').textContent = formatClock(now);
        $('clockSeconds').textContent = formatSeconds(now);
        $('clockDate').textContent = now.toLocaleDateString('ja-JP', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });
        checkClockAnnouncements(now);
        checkAgendaAnnouncements(now);
        checkScheduledTimerStart(now);
        renderAgenda(now);
        lastDisplayTime = now;
      }

      function resetClockFiredStateIfDateChanged(now) {
        const todayKey = dateKey(now);
        if (state.clockFiredDateKey === todayKey) return;

        state.clockAnnouncements.forEach((announcement) => {
          announcement.firedKey = '';
        });
        state.clockFiredDateKey = todayKey;
        saveSettingsToStorage();
      }

      function resetAgendaFiredStateIfDateChanged(now) {
        const todayKey = dateKey(now);
        if (state.agendaFiredDateKey === todayKey) return;

        state.agendaItems.forEach((item) => {
          item.firedKey = '';
        });
        state.agendaFiredDateKey = todayKey;
        saveSettingsToStorage();
      }

      function checkClockAnnouncements(now) {
        resetClockFiredStateIfDateChanged(now);

        if (!lastDisplayTime) return;

        const todayKey = state.clockFiredDateKey;

        const previousSeconds = secondsOfDay(lastDisplayTime);
        const currentSeconds = secondsOfDay(now);

        state.clockAnnouncements.forEach((announcement, index) => {
          if (!announcement.enabled || !announcement.text) return;

          const targetSeconds = Number(announcement.hour) * 3600
            + Number(announcement.minute) * 60
            + (Number(announcement.second) || 0);
          const firedKey = `${todayKey}-${index}-${targetSeconds}`;
          const crossed = crossedTargetSeconds(previousSeconds, currentSeconds, targetSeconds);

          if (crossed && announcement.firedKey !== firedKey) {
            announcement.firedKey = firedKey;
            saveSettingsToStorage();
            speak(announcement.text, `clock-${firedKey}`);
          }
        });
      }

      function agendaSeconds(item) {
        return Number(item.hour) * 3600 + Number(item.minute) * 60;
      }

      function sortedAgendaItems() {
        return state.agendaItems
          .map((item, order) => ({ ...item, order }))
          .filter((item) => item.enabled && item.title)
          .sort((a, b) => agendaSeconds(a) - agendaSeconds(b) || a.order - b.order);
      }

      function formatAgendaDelta(seconds) {
        const safeSeconds = Math.max(0, Math.ceil(seconds));
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        const restSeconds = safeSeconds % 60;

        if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(restSeconds)}`;
        return `${pad(minutes)}:${pad(restSeconds)}`;
      }

      function agendaDisplay(now) {
        const items = sortedAgendaItems();
        if (!items.length) return { status: 'empty' };

        const currentSeconds = secondsOfDay(now);
        const next = items.find((item) => agendaSeconds(item) > currentSeconds);
        if (next) {
          return {
            status: 'upcoming',
            item: next,
            seconds: agendaSeconds(next) - currentSeconds,
          };
        }

        const overrunSeconds = state.agendaOverrunMinutes * 60;
        let latestPast = null;
        items.forEach((item) => {
          const targetSeconds = agendaSeconds(item);
          const withinOverrun = currentSeconds >= targetSeconds && currentSeconds - targetSeconds <= overrunSeconds;
          if (withinOverrun && (!latestPast || targetSeconds > agendaSeconds(latestPast))) {
            latestPast = item;
          }
        });

        if (latestPast) {
          return {
            status: 'overrun',
            item: latestPast,
            seconds: currentSeconds - agendaSeconds(latestPast),
          };
        }

        return { status: 'done' };
      }

      function renderAgenda(now = getDisplayNow()) {
        const display = agendaDisplay(now);

        if (display.status === 'empty') {
          renderAgendaMessage('予定なし', '設定から予定を追加してください');
          return;
        }

        if (display.status === 'done') {
          renderAgendaMessage('本日の予定は終了しました', '');
          return;
        }

        const item = display.item;
        $('agendaMessage').hidden = true;
        $('agendaDelta').hidden = false;
        const deltaText = formatAgendaDelta(display.seconds);
        $('agendaDeltaLabel').textContent = display.status === 'overrun' ? '超過' : 'あと';
        $('agendaDeltaValue').textContent = deltaText;
        $('agendaDeltaValue').dataset.long = String(deltaText.length > 5);
        $('agendaTime').textContent = `${pad(item.hour)}:${pad(item.minute)}`;
        $('agendaTitle').textContent = item.title;
      }

      function renderAgendaMessage(message, detail) {
        $('agendaMessage').hidden = false;
        $('agendaDelta').hidden = true;
        $('agendaMessage').textContent = message;
        $('agendaTime').textContent = '';
        $('agendaTitle').textContent = detail;
      }

      function checkAgendaAnnouncements(now) {
        resetAgendaFiredStateIfDateChanged(now);

        if (!lastDisplayTime) return;

        const todayKey = state.agendaFiredDateKey;
        const previousSeconds = secondsOfDay(lastDisplayTime);
        const currentSeconds = secondsOfDay(now);
        sortedAgendaItems().forEach((item) => {
          if (!item.announceEnabled || !item.announceText) return;

          const targetSeconds = agendaSeconds(item);
          const firedKey = `${todayKey}-${item.order}-${targetSeconds}`;
          if (crossedTargetSeconds(previousSeconds, currentSeconds, targetSeconds) && item.firedKey !== firedKey) {
            state.agendaItems[item.order].firedKey = firedKey;
            saveSettingsToStorage();
            speak(item.announceText, `agenda-${firedKey}`);
          }
        });
      }

      function timerDurationSeconds() {
        return Math.max(1, Number(state.timerDurationMinutes) || 1) * 60;
      }

      function remainingSeconds() {
        if (!timer.running) {
          return Math.max(0, timerDurationSeconds() - timer.pausedElapsed);
        }

        const runningElapsed = (performance.now() - timer.startMono) / 1000;
        return Math.max(0, timerDurationSeconds() - (runningElapsed + timer.pausedElapsed));
      }

      function cancelPendingFinish() {
        if (timer.finishTimeoutId !== null) {
          clearTimeout(timer.finishTimeoutId);
          timer.finishTimeoutId = null;
        }
      }

      function rebuildTimer() {
        cancelPendingFinish();
        timer.generation += 1;
        timer.running = false;
        timer.done = false;
        timer.pausedElapsed = 0;
        timer.lastRemaining = null;
        timer.fired = new Set();
        timer.zeroHandled = false;

        cancelSpeechQueue();
        renderTimer();
      }

      function startTimer() {
        cancelPendingFinish();
        if (timer.done) rebuildTimer();

        if (!timer.running) {
          timer.generation += 1;
          timer.startMono = performance.now();
          timer.running = true;
          timer.lastRemaining = remainingSeconds();
          showToast('タイマー開始');
        }
      }

      function pauseTimer() {
        if (!timer.running) return;

        timer.pausedElapsed += (performance.now() - timer.startMono) / 1000;
        timer.running = false;
        showToast('一時停止');
      }

      function finishTimer(expectedGeneration) {
        timer.finishTimeoutId = null;
        if (expectedGeneration !== timer.generation) return;
        timer.done = true;
        timer.running = false;
        timer.pausedElapsed = timerDurationSeconds();
        renderTimer();
        showToast('タイマー終了');
      }

      function checkTimerAnnouncements(remaining) {
        if (!timer.running) return;

        const previous = timer.lastRemaining ?? remaining;
        state.timerAnnouncements.forEach((announcement, index) => {
          const threshold = Math.max(0, Number(announcement.minutes) || 0) * 60;
          if (!announcement.enabled || !announcement.text) return;

          if (!timer.fired.has(index) && previous > threshold && remaining <= threshold) {
            timer.fired.add(index);
            speak(announcement.text, `timer-${timer.generation}-${index}-${threshold}`);
          }
        });

        timer.lastRemaining = remaining;

        if (remaining <= 0 && !timer.zeroHandled) {
          timer.zeroHandled = true;
          state.timerAnnouncements.forEach((announcement, index) => {
            if (announcement.enabled && Number(announcement.minutes) === 0 && !timer.fired.has(index)) {
              timer.fired.add(index);
              speak(announcement.text, `timer-${timer.generation}-${index}-0`);
            }
          });
          const finishGeneration = timer.generation;
          cancelPendingFinish();
          timer.finishTimeoutId = setTimeout(() => finishTimer(finishGeneration), TIMER_FINISH_DELAY_MS);
        }
      }

      function renderTimer() {
        const remaining = remainingSeconds();
        checkTimerAnnouncements(remaining);
        $('timerTime').textContent = formatTimer(remaining);
        setText('timerStatus', timer.done ? '終了' : timer.running ? '動作中' : '停止中');
        $('startPauseBtn').textContent = timer.running ? '一時停止' : (timer.pausedElapsed > 0 ? '再開' : '開始');
      }

      function checkScheduledTimerStart(now) {
        if (!state.timerStartTime || timer.running || timer.done) return;
        if (!lastDisplayTime) return;

        const [hour, minute] = state.timerStartTime.split(':').map(Number);
        if (!Number.isFinite(hour) || !Number.isFinite(minute)) return;

        const targetSeconds = hour * 3600 + minute * 60;
        const previousSeconds = secondsOfDay(lastDisplayTime);
        const currentSeconds = secondsOfDay(now);
        const todayKey = `${dateKey(now)}-${state.timerStartTime}`;
        const crossed = crossedTargetSeconds(previousSeconds, currentSeconds, targetSeconds);

        if (crossed && state.lastTimerStartKey !== todayKey) {
          state.lastTimerStartKey = todayKey;
          saveSettingsToStorage();
          startTimer();
        }
      }

      function renderSettings() {
        $('rateInput').value = state.voice.rate;
        $('timerDurationInput').value = state.timerDurationMinutes;
        $('timerStartTimeInput').value = state.timerStartTime;
        $('agendaOverrunInput').value = state.agendaOverrunMinutes;
        renderClockAnnouncements();
        renderTimerAnnouncements();
        renderAgendaItems();
      }

      function renderClockAnnouncements() {
        const container = $('clockAnnounces');
        container.innerHTML = '';

        for (let index = 0; index < MAX_ANNOUNCEMENTS; index += 1) {
          const announcement = state.clockAnnouncements[index] || { enabled: false, hour: 0, minute: 0, second: 0, text: '' };
          container.insertAdjacentHTML('beforeend', `
            <div class="announce-row">
              <label>有効<input data-ca="${index}" data-k="enabled" type="checkbox" ${announcement.enabled ? 'checked' : ''}></label>
              <label>時<input data-ca="${index}" data-k="hour" type="number" min="0" max="23" value="${announcement.hour}"></label>
              <label>分<input data-ca="${index}" data-k="minute" type="number" min="0" max="59" value="${announcement.minute}"></label>
              <label>秒<input data-ca="${index}" data-k="second" type="number" min="0" max="59" value="${announcement.second || 0}"></label>
              <label>文章<input data-ca="${index}" data-k="text" value="${escapeHtml(announcement.text)}"></label>
            </div>
          `);
        }
      }

      function renderTimerAnnouncements() {
        const container = $('timerAnnounces');
        container.innerHTML = '';

        for (let index = 0; index < MAX_ANNOUNCEMENTS; index += 1) {
          const announcement = state.timerAnnouncements[index] || { enabled: false, minutes: 0, text: '' };
          container.insertAdjacentHTML('beforeend', `
            <div class="timer-announce-row">
              <label>有効<input data-ta="${index}" data-k="enabled" type="checkbox" ${announcement.enabled ? 'checked' : ''}></label>
              <label>残り分<input data-ta="${index}" data-k="minutes" type="number" min="0" step="1" value="${announcement.minutes ?? 0}"></label>
              <label>文章<input data-ta="${index}" data-k="text" value="${escapeHtml(announcement.text)}"></label>
            </div>
          `);
        }
      }

      function renderAgendaItems() {
        const container = $('agendaItems');
        container.innerHTML = '';

        state.agendaItems.slice(0, MAX_AGENDA_ITEMS).forEach((item, index) => {
          container.insertAdjacentHTML('beforeend', `
            <div class="agenda-row">
              <label>有効<input data-ai="${index}" data-k="enabled" type="checkbox" ${item.enabled ? 'checked' : ''}></label>
              <label>時<input data-ai="${index}" data-k="hour" type="number" min="0" max="23" value="${item.hour}"></label>
              <label>分<input data-ai="${index}" data-k="minute" type="number" min="0" max="59" value="${item.minute}"></label>
              <label>名称<input data-ai="${index}" data-k="title" value="${escapeHtml(item.title)}"></label>
              <label>読上<input data-ai="${index}" data-k="announceEnabled" type="checkbox" ${item.announceEnabled ? 'checked' : ''}></label>
              <label>読み上げ文章<input data-ai="${index}" data-k="announceText" value="${escapeHtml(item.announceText)}"></label>
              <button data-agenda-action="up" data-index="${index}" type="button">上へ</button>
              <button data-agenda-action="down" data-index="${index}" type="button">下へ</button>
              <button data-agenda-action="delete" data-index="${index}" type="button" class="danger">削除</button>
            </div>
          `);
        });
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"]/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
        }[char]));
      }

      function collectSettingsFromForm() {
        state.timerDurationMinutes = Math.max(1, parseInt($('timerDurationInput').value || '1', 10));
        state.timerStartTime = $('timerStartTimeInput').value;
        state.lastTimerStartKey = '';
        state.agendaOverrunMinutes = clampInteger($('agendaOverrunInput').value, 1, 60, defaults.agendaOverrunMinutes);
        state.voice.rate = Number($('rateInput').value) || 1;
        state.clockAnnouncements = [];
        state.timerAnnouncements = [];
        state.agendaItems = collectAgendaItemsFromForm();

        document.querySelectorAll('[data-ca]').forEach((element) => {
          const index = Number(element.dataset.ca);
          const key = element.dataset.k;
          state.clockAnnouncements[index] ??= {};
          state.clockAnnouncements[index][key] = element.type === 'checkbox'
            ? element.checked
            : key === 'text' ? element.value : Number(element.value);
        });

        document.querySelectorAll('[data-ta]').forEach((element) => {
          const index = Number(element.dataset.ta);
          const key = element.dataset.k;
          state.timerAnnouncements[index] ??= {};
          state.timerAnnouncements[index][key] = element.type === 'checkbox'
            ? element.checked
            : key === 'text' ? element.value : Number(element.value);
        });


        state.clockAnnouncements.forEach((announcement) => {
          announcement.firedKey = '';
        });
        state.agendaItems.forEach((item) => {
          item.firedKey = '';
        });
      }

      function collectAgendaItemsFromForm() {
        const items = [];
        document.querySelectorAll('[data-ai]').forEach((element) => {
          const index = Number(element.dataset.ai);
          const key = element.dataset.k;
          items[index] ??= {};
          items[index][key] = element.type === 'checkbox'
            ? element.checked
            : ['title', 'announceText'].includes(key) ? element.value : Number(element.value);
        });

        return normalizeAgendaItems(items);
      }

      function validateSettings() {
        let valid = true;
        document.querySelectorAll('.invalid').forEach((element) => element.classList.remove('invalid'));

        const requireNumber = (selector, min, max, integer = true) => {
          document.querySelectorAll(selector).forEach((element) => {
            const value = Number(element.value);
            const invalid = element.value === ''
              || !Number.isFinite(value)
              || value < min
              || value > max
              || (integer && !Number.isInteger(value));
            if (invalid) {
              element.classList.add('invalid');
              valid = false;
            }
          });
        };

        requireNumber('#rateInput', 0.5, 1.5, false);

        if (state.mode === 'clock') {
          requireNumber('[data-ca][data-k="hour"]', 0, 23);
          requireNumber('[data-ca][data-k="minute"]', 0, 59);
          requireNumber('[data-ca][data-k="second"]', 0, 59);
        }

        if (state.mode === 'timer') {
          requireNumber('#timerDurationInput', 1, 1440);
          requireNumber('[data-ta][data-k="minutes"]', 0, 1440);
        }

        if (state.mode === 'agenda') {
          requireNumber('#agendaOverrunInput', 1, 60);
          requireNumber('[data-ai][data-k="hour"]', 0, 23);
          requireNumber('[data-ai][data-k="minute"]', 0, 59);
        }

        return valid;
      }

      function openSettings() {
        renderSettings();
        $('settingsPanel').dataset.mode = state.mode;
        $('settingsPanel').classList.add('open');
        $('closeSettings').focus();
      }

      function closeSettings() {
        $('settingsPanel').classList.remove('open');
        $('settingsBtn').focus();
      }

      function bindEvents() {
        $('clockTab').addEventListener('click', () => setMode('clock'));
        $('timerTab').addEventListener('click', () => setMode('timer'));
        $('agendaTab').addEventListener('click', () => setMode('agenda'));
        $('settingsBtn').addEventListener('click', openSettings);
        $('closeSettings').addEventListener('click', closeSettings);
        $('voiceBtn').addEventListener('click', () => speak('音声を有効化しました'));
        $('startPauseBtn').addEventListener('click', () => (timer.running ? pauseTimer() : startTimer()));
        $('resetBtn').addEventListener('click', () => rebuildTimer());
        $('resetClockFired').addEventListener('click', resetClockAnnouncementState);
        $('addAgendaItem').addEventListener('click', addAgendaItem);
        $('agendaItems').addEventListener('click', handleAgendaAction);
        $('testVoice').addEventListener('click', () => speak($('testText').value));
        $('saveSettings').addEventListener('click', saveSettingsFromDialog);
        $('resetAll').addEventListener('click', resetAllSettings);
        $('themeBtn').addEventListener('click', toggleTheme);
        document.addEventListener('keydown', handleShortcut);
      }

      function resetClockAnnouncementState() {
        state.clockAnnouncements.forEach((announcement) => {
          announcement.firedKey = '';
        });
        saveSettingsToStorage();
        showToast('時計読み上げ状態をリセットしました');
      }

      function addAgendaItem() {
        state.agendaItems = collectAgendaItemsFromForm();
        if (state.agendaItems.length >= MAX_AGENDA_ITEMS) {
          showToast(`予定は最大${MAX_AGENDA_ITEMS}件です`);
          return;
        }

        state.agendaItems.push({ enabled: true, hour: 13, minute: 0, title: '新しい予定', announceEnabled: false, announceText: '' });
        renderAgendaItems();
      }

      function handleAgendaAction(event) {
        const button = event.target.closest('[data-agenda-action]');
        if (!button) return;

        const index = Number(button.dataset.index);
        const action = button.dataset.agendaAction;
        state.agendaItems = collectAgendaItemsFromForm();

        if (action === 'delete') {
          state.agendaItems.splice(index, 1);
        } else if (action === 'up' && index > 0) {
          [state.agendaItems[index - 1], state.agendaItems[index]] = [state.agendaItems[index], state.agendaItems[index - 1]];
        } else if (action === 'down' && index < state.agendaItems.length - 1) {
          [state.agendaItems[index], state.agendaItems[index + 1]] = [state.agendaItems[index + 1], state.agendaItems[index]];
        }

        renderAgendaItems();
      }

      function saveSettingsFromDialog() {
        if (!validateSettings()) {
          showToast('入力値の範囲を確認してください');
          return;
        }

        collectSettingsFromForm();
        lastDisplayTime = getDisplayNow();
        saveSettingsToStorage();
        applyTheme();
        rebuildTimer();
        renderAgenda();
        showToast('設定を保存しました');
        closeSettings();
      }

      function resetAllSettings() {
        if (!confirm('設定を初期化しますか？')) return;

        state = clone(defaults);
        saveSettingsToStorage();
        rebuildTimer();
        renderAgenda();
        applyTheme();
        renderSettings();
        showToast('初期化しました');
      }

      function toggleTheme() {
        state.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        saveSettingsToStorage();
        applyTheme();
      }

      function handleShortcut(event) {
        const tagName = event.target.tagName;
        if (event.key === 'Escape') closeSettings();
        if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tagName)) return;

        if (event.code === 'Space' && state.mode === 'timer') {
          event.preventDefault();
          timer.running ? pauseTimer() : startTimer();
        }

        if (event.key.toLowerCase() === 'r' && state.mode === 'timer') {
          rebuildTimer();
        }
      }

      function init() {
        applyTheme();
        setMode(state.mode);
        bindEvents();
        rebuildTimer();
        updateClock();
        setInterval(updateClock, 250);
        setInterval(renderTimer, 120);
        $('voiceStatus').textContent = 'speechSynthesis' in window
          ? 'ブラウザ標準のSpeech Synthesis APIを使用します。'
          : '音声読み上げ非対応のブラウザです。';
      }

      init();
    })();
  </script>
</body>
</html>
